<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Еда</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="food.css" />
  </head>

  <body>
    <div class="food-preview-bg"></div>

    <section class="food-page">
      <h1>Что будем кушать?</h1>

      <div class="food-cards">
        <div class="food-cards">
          <button class="food-card" data-food="Фастфуд">
            <video class="food-video" muted loop playsinline></video>

            🍔
            <span>Фастфуд</span>
          </button>

          <button
            class="food-card"
            data-food="Классическая еда"
            data-video="images/classic.mp4"
          >
            🍛
            <span>Классическая еда</span>
          </button>

          <button
            class="food-card"
            data-food="Перекус"
            data-video="images/snack.mp4"
          >
            🥪
            <span>Перекус</span>
          </button>

          <button
            class="food-card"
            data-food="Особенное"
            data-video="images/special.mp4"
          >
            ✨
            <span>Особенное</span>
          </button>

          <button
            class="food-card"
            data-food="Острое"
            data-video="images/spicy.mp4"
          >
            🌶️
            <span>Острое</span>
          </button>
        </div>
        <div class="food-actions">
          <button id="backFoodBtn" class="action-btn secondary">Назад</button>

          <button id="confirmFoodBtn" class="action-btn">Подтвердить</button>
        </div>
      </div>
    </section>

    <script src="food.js"></script>
  </body>
</html>
