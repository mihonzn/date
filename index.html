<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Date</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-blur blur-1"></div>
    <div class="bg-blur blur-2"></div>
    <div class="bg-blur blur-3"></div>
    <div class="hearts" id="hearts"></div>
    <main class="card">
      <div class="hero">
        <h1>Приглашаю тебя на свидание</h1>
      </div>
      <div class="buttons">
        <button id="yesBtn" class="btn yes">
          <span>Да</span>
          <img src="images/yes.jpg" class="btn-icon" alt="Да" />
        </button>
        <button id="noBtn" class="btn no">
          <span>Нет</span>
          <img src="images/no.jpg" class="btn-icon" alt="Нет" />
        </button>
      </div>

      <img id="sadImage" src="" alt="" />
    </main>

    <script src="script.js"></script>
  </body>
</html>
